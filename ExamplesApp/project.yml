name: SwiftUIMasonryLayoutsExamplesApp
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "26.0"
packages:
  SwiftUIMasonryLayouts:
    path: ..
targets:
  SwiftUIMasonryLayoutsExamplesApp:
    type: application
    platform: iOS
    sources:
      - path: SwiftUIMasonryLayoutsExamplesApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: thought.swiftuimasonrylayouts.examples
        INFOPLIST_FILE: SwiftUIMasonryLayoutsExamplesApp/Info.plist
        SWIFT_VERSION: 6.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: SwiftUIMasonryLayouts
        product: SwiftUIMasonryLayouts
    scheme:
      testTargets: []
